<section data-fls-index class="home-hero">
  <div data-fls-slider style="overflow: hidden;" class="home-hero__slider swiper">
    <div class="home-hero__wrapper swiper-wrapper" style="width: 100%; height: 100%; box-sizing: content-box; display: flex; position: relative;">
      <div class="home-hero__slide swiper-slide" style="flex-shrink: 0; width: 100%; overflow: hidden;">
        <div class="home-hero__slide-body">
          <!-- видое-элемент - подтягивается через JS из ata-video в зависимости от условия ширины экрана, на мобилках не отобржается. Видео соотношением 1920/924 -->
          <div class="home-hero__media" data-video="@video/banner-elly-crop.mp4"></div>
          <!-- изображение: для ПК служит постером для видео перед загрузкой, для мобильных устройств служит основным изображением -->
          <div class="home-hero__img">
            <picture>
              <!-- основное изображение, отображается только для мобилок -->
              <source media="(max-width: 30.186em)" srcset="@img/hero/image-mb.webp" type="image/webp">
              <!-- постер для видео, отображается только для ПК -->
              <img data-img-ignore fetchpriority="high" width="375" height="784" alt="Image" src="@img/hero/poster-1.webp">
            </picture>
          </div>
          <div class="home-hero__container">
            <a href="#" data-fls-button class="home-hero__link btn btn--b" aria-label="link">
              <span>Детальніше</span>
            </a>
          </div>
        </div>
      </div>

      <div class="home-hero__slide swiper-slide" style="flex-shrink: 0; width: 100%; overflow: hidden;">
        <div class="home-hero__slide-body">
          <div class="home-hero__media" data-video="@video/banner-bonisano-crop.mp4"></div>
          <div class="home-hero__img">
            <picture>
              <source media="(max-width: 30.186em)" srcset="@img/hero/image-mb-2.webp" type="image/webp">
              <img data-img-ignore width="375" height="784" alt="Image" src="@img/hero/poster-2.webp">
            </picture>
          </div>
          <div class="home-hero__container">
            <a href="#" data-fls-button class="home-hero__link btn btn--b" aria-label="link">
              <span>Детальніше</span>
            </a>
          </div>
        </div>
      </div>
      <div class="home-hero__slide swiper-slide" style="flex-shrink: 0; width: 100%; overflow: hidden;">
        <div class="home-hero__slide-body">
          <div class="home-hero__media" data-video="@video/banner-molinero-crop.mp4"></div>
          <div class="home-hero__img">
            <picture>
              <source media="(max-width: 30.186em)" srcset="@img/hero/image-mb.webp" type="image/webp">
              <img data-img-ignore width="375" height="784" alt="Image" src="@img/hero/poster-3.webp">
            </picture>
          </div>
          <div class="home-hero__container">
            <a href="#" data-fls-button class="home-hero__link btn btn--b" aria-label="link">
              <span>Детальніше</span>
            </a>
          </div>
        </div>
      </div>
    </div>
    <div class="home-hero__nav __container">
      <button type="button" class="home-hero__btn swiper-button-prev">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M26.5 29L21.5 24L26.5 19" stroke="#633510" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>

      </button>
      <button type="button" class="home-hero__btn swiper-button-next">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21.5 19L26.5 24L21.5 29" stroke="#633510" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>
  </div>
  <div class="home-hero__footer">
    <a href="@files/test.pdf" class="home-hero__dwnl" target="_blank">
      <span>Завантажити<br> каталог</span>
    </a>
  </div>
</section>
